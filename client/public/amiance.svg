<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Primary Gradient -->
    <linearGradient id="primaryGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#386641" />
      <stop offset="100%" stop-color="#a7c957" />
    </linearGradient>
    
    <!-- Soft Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(40, 40)">
    <!-- The stylized 'A' Mark -->
    <path d="M 40 120 L 70 20 L 110 20 L 140 120 L 110 120 L 100 85 L 50 85 L 40 120 Z" 
          fill="none" stroke="url(#primaryGradient)" stroke-width="12" stroke-linejoin="round" filter="url(#softGlow)"/>
    
    <!-- Inner geometric shape of A -->
    <path d="M 58 65 L 75 35 L 92 65 Z" fill="#6a994e" />

    <!-- A decorative dynamic swoop to fit the aesthetic -->
    <path d="M 20 100 Q 75 140 160 90" fill="none" stroke="#bc4749" stroke-width="6" stroke-linecap="round" />
    <circle cx="160" cy="90" r="6" fill="#bc4749" />
  </g>

  <g transform="translate(230, 125)">
    <!-- AMIANCE Title Text -->
    <text x="0" y="0" 
          font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-weight="900" 
          font-size="72" 
          letter-spacing="8" 
          fill="#386641">
      AMIANCE
    </text>
    
    <!-- Subtitle/Tagline -->
    <text x="5" y="32" 
          font-family="'Inter', system-ui, -apple-system, sans-serif" 
          font-weight="600" 
          font-size="14" 
          letter-spacing="5" 
          fill="#a7c957">
      MODERN EXPERIENCES
    </text>
  </g>
</svg>
